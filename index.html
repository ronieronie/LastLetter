<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Real-Time Last Letter Game</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="card shadow p-4">
      <h2 class="text-center mb-3">Real-Time Last Letter Game</h2>

      <p class="text-center">
        <strong>Current Turn:</strong>
        <span id="turn">Waiting…</span>
      </p>

      <p id="rule" class="text-center text-muted">Enter any word to start!</p>

      <div class="input-group mb-2">
        <input type="text" id="wordInput" class="form-control" placeholder="Word" />
        <button class="btn btn-primary" onclick="submit()">Submit</button>
      </div>

      <div id="message" class="text-center mb-3"></div>

      <h5>Scores:</h5>
      <ul class="list-group mb-2">
        <li class="list-group-item">Player 1: <span id="score1">0</span></li>
        <li class="list-group-item">Player 2: <span id="score2">0</span></li>
        <li class="list-group-item">Player 3: <span id="score3">0</span></li>
      </ul>

      <button class="btn btn-danger" onclick="resetGame()">Reset</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    function submit() {
      const w = document.getElementById("wordInput").value;
      socket.emit("submitWord", w);
      document.getElementById("wordInput").value = "";
    }

    socket.on("stateUpdate", (state) => {
      const t = state.currentPlayer + 1;
      document.getElementById("turn").innerText = `Player ${t}`;

      document.getElementById("score1").innerText = state.scores[0] || 0;
      document.getElementById("score2").innerText = state.scores[1] || 0;
      document.getElementById("score3").innerText = state.scores[2] || 0;

      if (state.lastLetter)
        document.getElementById("rule").innerText =
          `Next starts with "${state.lastLetter.toUpperCase()}"`;
    });

    socket.on("message", (m) => {
      document.getElementById("message").innerText = m;
    });

    function resetGame() {
      socket.emit("resetGame");
    }
  </script>
</body>
</html>
