<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3-Player Last Letter Game</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    <h2 class="text-center mb-3">3-Player Last Letter Game</h2>

    <h5 class="text-center">
      Turn: <span id="turn">Player 1</span> | 
      Time: <span id="timer">20</span>s
    </h5>

    <p id="rule" class="text-muted text-center">
      Enter any word to start!
    </p>

    <div class="input-group mb-3">
      <input type="text" id="wordInput" class="form-control" placeholder="Enter a word">
      <button class="btn btn-primary" onclick="submitWord()">Submit</button>
    </div>

    <div id="message" class="mb-3 text-center"></div>

    <h5>Scores:</h5>
    <ul>
      <li>Player 1: <span id="score1">0</span></li>
      <li>Player 2: <span id="score2">0</span></li>
      <li>Player 3: <span id="score3">0</span></li>
    </ul>

    <button class="btn btn-danger mt-3" onclick="resetGame()">Reset Game</button>
  </div>
</div>

<script>
let lastLetter = null;
let players = ["Player 1", "Player 2", "Player 3"];
let scores = [0, 0, 0];
let currentPlayer = 0;

let timeLeft = 20;
let timerInterval;

// Start timer
function startTimer() {
  clearInterval(timerInterval);
  timeLeft = 20;
  document.getElementById("timer").innerText = timeLeft;

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      nextTurn("⏰ Time's up!");
    }
  }, 1000);
}

// Move to next player
function nextTurn(msg = "") {
  const message = document.getElementById("message");

  if (msg) {
    message.innerHTML = `<span class='text-warning'>${msg}</span>`;
  }

  currentPlayer = (currentPlayer + 1) % players.length;
  document.getElementById("turn").innerText = players[currentPlayer];
  document.getElementById("wordInput").value = "";

  startTimer();
}

// Validate word using dictionary API
async function isValidWord(word) {
  try {
    let res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
    return res.ok;
  } catch {
    return false;
  }
}

async function submitWord() {
  const input = document.getElementById("wordInput");
  const message = document.getElementById("message");
  const rule = document.getElementById("rule");

  let word = input.value.trim().toLowerCase();

  if (word === "") {
    message.innerHTML = "<span class='text-danger'>Enter a word.</span>";
    return;
  }

  // last letter rule
  if (lastLetter && word[0] !== lastLetter) {
    nextTurn(`❌ Must start with "${lastLetter.toUpperCase()}"`);
    return;
  }

  message.innerHTML = "Checking word...";

  let valid = await isValidWord(word);

  if (!valid) {
    nextTurn("❌ Not a valid English word!");
    return;
  }

  // correct word
  scores[currentPlayer]++;
  updateScores();

  lastLetter = word[word.length - 1];
  rule.innerText = `Next word must start with: "${lastLetter.toUpperCase()}"`;

  message.innerHTML = `<span class='text-success'>✅ ${players[currentPlayer]} is correct!</span>`;

  nextTurn();
}

function updateScores() {
  document.getElementById("score1").innerText = scores[0];
  document.getElementById("score2").innerText = scores[1];
  document.getElementById("score3").innerText = scores[2];
}

function resetGame() {
  lastLetter = null;
  scores = [0, 0, 0];
  currentPlayer = 0;

  document.getElementById("score1").innerText = 0;
  document.getElementById("score2").innerText = 0;
  document.getElementById("score3").innerText = 0;

  document.getElementById("turn").innerText = players[currentPlayer];
  document.getElementById("rule").innerText = "Enter any word to start!";
  document.getElementById("message").innerHTML = "";
  document.getElementById("wordInput").value = "";

  startTimer();
}

// start game on load
startTimer();
</script>

</body>
</html>
